<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HITL Gateway — Ζωντανά αρχεία καταγραφής</title>
  <style>
    @import url('https://rsms.me/inter/inter.css');
    html { font-family: 'Inter', sans-serif; }
    @supports (font-variation-settings: normal) { html { font-family: 'Inter var', sans-serif; } }

    :root {
      --bg-top: #000000;
      --bg-bottom: #1c2b53;
      --pill-bg: #1e1e1e;
      --surface: rgba(255,255,255,0.035);
      --surface2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.15);
      --text-primary: #ffffff;
      --text-secondary: #909498;
      --text-dim: #494c4f;
      --accent: #5eacff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #da3633;
      --purple: #7b83eb;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(ellipse at 50% 120%, var(--bg-bottom) 0%, var(--bg-top) 72%);
      color: var(--text-primary);
    }

    /* ── ENTRANCE ── */
    .app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      opacity: 0;
      transform: translateY(14px) scale(0.988);
      filter: saturate(0.75) blur(3px);
      transition: opacity 0.7s ease, transform 0.95s cubic-bezier(0.2, 0.75, 0.2, 1), filter 0.85s ease;
    }
    .app.ready { opacity: 1; transform: none; filter: none; }

    /* ── TOPBAR ── */
    .topbar {
      height: 62px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      opacity: 0; transform: translateY(-10px);
      transition: opacity 0.5s ease 0.1s, transform 0.65s cubic-bezier(0.2,0.75,0.2,1) 0.1s;
    }
    .app.ready .topbar { opacity: 1; transform: none; }

    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-weight: 700; font-size: 15px; letter-spacing: -0.3px;
    }
    .logo-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }

    .badge {
      font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 100px; letter-spacing: 0.5px;
    }
    .badge-live {
      background: rgba(63,185,80,0.18); color: var(--green);
      border: 1px solid rgba(63,185,80,0.3);
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }

    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .stat-pill {
      padding: 5px 13px; border-radius: 100px;
      background: var(--pill-bg); border: 1px solid var(--border);
      font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 6px;
    }
    .stat-val { color: var(--text-primary); font-weight: 600; font-variant-numeric: tabular-nums; }

    .icon-btn {
      width: 34px; height: 34px; border-radius: 100px;
      background: var(--pill-bg); border: 1px solid var(--border);
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s; flex-shrink: 0;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.spinning svg { animation: spin 0.55s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PROGRESS BAR ── */
    .progress-bar { height: 2px; flex-shrink: 0; background: transparent; overflow: hidden; }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      border-radius: 1px; transition: width 0.4s ease;
    }

    /* ── POLL DOT ── */
    .poll-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    .poll-dot.idle { background: var(--text-dim); animation: none; }
    .poll-dot.err  { background: var(--red); animation: none; }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.5} }

    /* ── MAIN LAYOUT ── */
    .main {
      flex: 1; overflow: hidden;
      display: grid; grid-template-columns: 400px 1fr;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.6s ease 0.28s, transform 0.75s cubic-bezier(0.2,0.75,0.2,1) 0.28s;
    }
    .app.ready .main { opacity: 1; transform: none; }

    /* ── LEFT: REQUEST LIST ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-header {
      padding: 14px 18px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 7px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
    .dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .dot-blue   { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot-red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
    .dot-gray   { background: var(--text-dim); }
    .time-label { font-size: 11px; color: var(--text-dim); }

    .list-body {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 9px;
    }
    .list-body::-webkit-scrollbar { width: 4px; }
    .list-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── REQUEST CARD ── */
    .req-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 15px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      opacity: 0;
      animation: cardReveal 0.42s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: none; }
    }
    .req-card:hover { background: var(--surface2); border-color: var(--border-hi); }
    .req-card.selected { border-color: var(--accent) !important; background: rgba(94,172,255,0.07); }
    .req-card.s-pending  { border-left: 3px solid var(--yellow); }
    .req-card.s-approved { border-left: 3px solid var(--green); }
    .req-card.s-denied   { border-left: 3px solid var(--red); }
    .req-card.s-escalated {
      border-left: 3px solid var(--red);
      animation: cardReveal 0.42s forwards, pulseCard 1.5s infinite 0.42s;
    }
    @keyframes pulseCard {
      0%,100% { box-shadow: 0 0 0 0 rgba(218,54,51,0.3); }
      50%      { box-shadow: 0 0 0 5px rgba(218,54,51,0); }
    }

    .rc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .rc-id  { font-size: 10.5px; font-family: 'JetBrains Mono','Fira Code',monospace; color: var(--text-dim); }

    .status-badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px;
      border-radius: 100px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .sb-pending   { background:rgba(210,153,34,.2); color:var(--yellow); border:1px solid rgba(210,153,34,.3); }
    .sb-approved  { background:rgba(63,185,80,.2);  color:var(--green);  border:1px solid rgba(63,185,80,.3); }
    .sb-denied    { background:rgba(218,54,51,.2);  color:var(--red);    border:1px solid rgba(218,54,51,.3); }
    .sb-escalated { background:rgba(218,54,51,.3);  color:#ff7b72;       border:1px solid rgba(218,54,51,.5); animation:flicker .6s infinite; }
    @keyframes flicker { 50%{opacity:.4} }

    .rc-action {
      font-size: 13px; font-weight: 600; color: var(--text-primary);
      margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rc-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 6px; flex-wrap: wrap; }
    .risk-bar-mini {
      height: 3px; border-radius: 2px; margin-top: 9px;
      background: var(--border); overflow: hidden;
    }
    .risk-fill-mini { height: 100%; border-radius: 2px; transition: width 0.55s ease; }

    /* ── RIGHT: DETAIL ── */
    .detail { display: flex; flex-direction: column; overflow: hidden; }
    .detail-body {
      flex: 1; overflow: hidden;
      display: grid; grid-template-columns: 1fr 340px;
    }

    .detail-left {
      overflow-y: auto; padding: 24px;
      border-right: 1px solid var(--border);
    }
    .detail-left::-webkit-scrollbar { width: 4px; }
    .detail-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .detail-right {
      overflow-y: auto; padding: 20px 18px;
      display: flex; flex-direction: column;
    }
    .detail-right::-webkit-scrollbar { width: 4px; }
    .detail-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── DATA SECTION ── */
    .data-section { margin-bottom: 22px; }
    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.9px; color: var(--text-dim);
      padding-bottom: 8px; margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .data-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 5px 0; gap: 10px;
    }
    .d-label {
      font-size: 11px; color: var(--text-secondary); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; padding-top: 1px;
    }
    .d-val {
      font-size: 12.5px; color: var(--text-primary); text-align: right; font-weight: 500;
      word-break: break-word;
    }
    .d-val.mono   { font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 11px; color: var(--accent); }
    .d-val.warn   { color: var(--yellow); }
    .d-val.danger { color: var(--red); }
    .d-val.ok     { color: var(--green); }

    /* ── RISK BAR ── */
    .risk-wrap { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: flex-end; }
    .risk-bar  { height: 4px; border-radius: 2px; width: 80px; background: var(--border); overflow: hidden; }
    .risk-fill { height: 100%; border-radius: 2px; transition: width 0.7s ease; }

    /* ── SLA ── */
    .sla-timer { font-family: 'JetBrains Mono',monospace; font-size: 14px; font-weight: 700; }
    .sla-ok   { color: var(--green); }
    .sla-warn { color: var(--yellow); }
    .sla-crit { color: var(--red); animation: flicker .6s infinite; }

    /* ── TAGS ── */
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag {
      font-size: 10px; padding: 3px 8px; border-radius: 100px; font-weight: 500;
      background: rgba(94,172,255,0.1); color: var(--accent);
      border: 1px solid rgba(94,172,255,0.2);
    }
    .tag.danger { background:rgba(218,54,51,.1); color:#ff7b72; border-color:rgba(218,54,51,.25); }
    .tag.warn   { background:rgba(210,153,34,.1); color:var(--yellow); border-color:rgba(210,153,34,.25); }

    /* ── CHANNEL PILLS ── */
    .ch-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600;
      background: var(--pill-bg); border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    /* ── AUDIT TRAIL ── */
    .audit-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.9px; color: var(--text-dim);
      padding-bottom: 10px; margin-bottom: 4px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .audit-list { display: flex; flex-direction: column; flex: 1; }
    .audit-item {
      display: flex; gap: 10px; padding: 7px 0 7px 14px;
      border-left: 2px solid var(--border);
      margin-left: 5px; position: relative;
    }
    .audit-item::before {
      content: ''; position: absolute; left: -5px; top: 12px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); border: 2px solid var(--bg-top);
    }
    .audit-item.ev-request::before  { background: var(--accent); }
    .audit-item.ev-route::before    { background: var(--yellow); }
    .audit-item.ev-deliver::before  { background: var(--purple); }
    .audit-item.ev-approve::before  { background: var(--green); }
    .audit-item.ev-deny::before     { background: var(--red); }
    .audit-item.ev-callback::before { background: var(--green); }
    .audit-item.ev-escalate::before { background: var(--red); }
    .audit-item.new { animation: slideIn 0.28s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
    .audit-ts   { font-size: 10px; font-family: monospace; color: var(--text-dim); flex-shrink: 0; padding-top: 2px; }
    .audit-text { font-size: 11.5px; color: var(--text-secondary); line-height: 1.45; }
    .audit-text strong { color: var(--text-primary); font-weight: 600; }

    /* ── DETAIL CONTENT ENTRANCE ── */
    .detail-content { animation: detailIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    @keyframes detailIn { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:none} }

    /* ── EMPTY STATE ── */
    .empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; color: var(--text-dim); text-align: center; padding: 32px;
    }
    .empty-icon  { font-size: 32px; opacity: 0.3; margin-bottom: 6px; }
    .empty-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
    .empty-sub   { font-size: 12px; }

    /* ── TOAST ── */
    .toast-area {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px; z-index: 200;
    }
    .toast {
      background: rgba(18,22,40,0.92); border: 1px solid var(--border-hi);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-radius: var(--radius-sm); padding: 10px 14px;
      font-size: 12.5px; max-width: 300px;
      display: flex; align-items: flex-start; gap: 8px;
      box-shadow: 0 8px 28px rgba(0,0,0,.55);
      animation: toastIn .2s ease;
    }
    @keyframes toastIn { from{transform:translateX(20px);opacity:0} to{transform:none;opacity:1} }
    .toast-info  { border-left: 3px solid var(--accent); }
    .toast-ok    { border-left: 3px solid var(--green); }
    .toast-warn  { border-left: 3px solid var(--yellow); }
    .toast-error { border-left: 3px solid var(--red); }
    .toast-icon  { font-size: 14px; flex-shrink: 0; }
    .toast-text  { line-height: 1.45; color: var(--text-primary); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── DECISION BUTTONS ── */
    .decision-bar {
      flex-shrink: 0;
      display: flex; gap: 10px; padding: 14px 24px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
    }
    .btn-decide {
      flex: 1; padding: 11px 0; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700; letter-spacing: 0.2px;
      border: none; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-decide:active { transform: scale(0.97); }
    .btn-decide:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-approve {
      background: rgba(63,185,80,0.18); color: var(--green);
      border: 1px solid rgba(63,185,80,0.4);
    }
    .btn-approve:hover:not(:disabled) { background: rgba(63,185,80,0.28); }
    .btn-deny {
      background: rgba(218,54,51,0.18); color: #ff7b72;
      border: 1px solid rgba(218,54,51,0.4);
    }
    .btn-deny:hover:not(:disabled) { background: rgba(218,54,51,0.28); }
  </style>
</head>
<body>

<div class="app" id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-icon"><img src="image-removebg-preview.png" width="24" height="24"></div>
        E-Poptis Gateway
      </div>
      <span class="badge badge-live">● ΖΩΝΤΑΝΑ</span>
    </div>
    <div class="topbar-right">
      <div class="stat-pill">
        Σύνολο <span class="stat-val" id="stat-total">0</span>
      </div>
      <div class="stat-pill">
        Εκκρεμή <span class="stat-val" id="stat-pending" style="color:var(--yellow)">0</span>
      </div>
      <div class="stat-pill">
        <div class="poll-dot idle" id="poll-dot"></div>
        <span id="poll-lbl" style="font-size:11px">Σύνδεση…</span>
      </div>
      <button class="icon-btn" id="refresh-btn" onclick="manualRefresh()" title="Ανανέωση τώρα">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: REQUEST LIST -->
    <div class="sidebar">
      <div class="panel-header">
        <div class="panel-title">
          <div class="dot dot-gray" id="sidebar-dot"></div>
          Αιτήματα
        </div>
        <span class="time-label" id="last-updated">—</span>
      </div>
      <div class="list-body" id="req-list">
        <div class="empty">
          <div class="empty-icon">🛡</div>
          <div class="empty-title">Δεν υπάρχουν αιτήματα ακόμη</div>
          <div class="empty-sub">Αναμονή για συμβάντα HITL…</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: DETAIL + AUDIT -->
    <div class="detail">
      <div class="panel-header">
        <div class="panel-title">
          <div class="dot dot-blue"></div>
          Λεπτομέρειες αιτήματος
        </div>
        <span class="time-label" id="detail-req-id">—</span>
      </div>
      <div id="detail-wrap" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
        <div class="empty" id="detail-empty">
          <div class="empty-icon">{ }</div>
          <div class="empty-title">Επιλέξτε ένα αίτημα</div>
          <div class="empty-sub">Πατήστε σε οποιοδήποτε αίτημα για να δείτε τα δεδομένα του και το ιστορικό ελέγχου.</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast-area" id="toast-area"></div>

<script>
/* ════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════ */
const API_BASE     = 'http://localhost:4050';
const API_URL      = API_BASE + '/api/logs';
const POLL_MS      = 4000;

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
const S = {
  requests:      [],   // normalized request objects
  selectedId:    null,
  slaTimers:     {},   // id -> intervalId
  slaStart:      {},   // id -> Date.now() when timer started
  seenIds:       new Set(),
  requestHashes: {},   // id -> fingerprint for change detection
  pollTimer:     null,
  busy:          false,
  hadError:      false,
};

/* ════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════ */
function fmtNow() {
  return new Date().toLocaleTimeString('el-GR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function fmtStatus(status) {
  const map = {
    pending: 'Εκκρεμεί',
    approved: 'Εγκρίθηκε',
    denied: 'Απορρίφθηκε',
    escalated: 'Κλιμακώθηκε',
  };
  return map[status] || status;
}

function fmtUrgency(urgency) {
  const map = {
    low: 'Χαμηλή',
    medium: 'Μεσαία',
    high: 'Υψηλή',
    critical: 'Κρίσιμη',
  };
  return map[urgency] || urgency || '—';
}

function fmtActionType(type) {
  const map = {
    permission_grant: 'Παραχώρηση δικαιώματος',
    software_provisioning: 'Παροχή λογισμικού',
    deployment: 'Ανέβασμα σε παραγωγή [Evox]',
    data_export: 'Εξαγωγή δεδομένων',
  };
  return map[type] || (type || 'Άγνωστο').replace(/_/g, ' ');
}

function fmtPermission(level) {
  const map = {
    read: 'ανάγνωση',
    write: 'εγγραφή',
    admin: 'διαχείριση',
  };
  return map[level] || level || '—';
}

function fmtChannel(channel) {
  const map = {
    teams: 'Teams',
    sms: 'SMS',
    phone: 'Τηλέφωνο',
    email: 'Email',
  };
  return map[channel] || channel;
}

function fmtEnvironment(env) {
  const map = {
    production: 'παραγωγή',
    staging: 'προπαραγωγή',
    development: 'ανάπτυξη',
    test: 'δοκιμή',
  };
  return map[env] || env;
}

function fmtRiskFlag(flag) {
  const map = {
    production_resource: 'πόρος παραγωγής',
    financial_data: 'οικονομικά δεδομένα',
    pii_adjacent: 'γειτνίαση με PII',
    high_cost: 'υψηλό κόστος',
    bulk_license: 'μαζική αδειοδότηση',
    budget_impact: 'επίδραση στον προϋπολογισμό',
    production_deployment: 'ανάπτυξη σε παραγωγή',
    infra_change: 'αλλαγή υποδομής',
    service_impact: 'επίδραση στην υπηρεσία',
    pii_export: 'εξαγωγή PII',
    external_destination: 'εξωτερικός προορισμός',
    gdpr_article_28: 'άρθρο 28 GDPR',
    critical_data: 'κρίσιμα δεδομένα',

  return map[flag] || flag.replace(/_/g, ' ');
}
function setProgress(p) {
  const el = document.getElementById('progress');
  el.style.width = p + '%';
  if (p >= 100) setTimeout(() => { el.style.width = '0%'; }, 1600);
}

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
function toast(msg, type = 'info', ms = 3500) {
  const icons = { info:'ℹ️', ok:'✅', warn:'⚠️', error:'🚨' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span class="toast-text">${msg}</span>`;
  document.getElementById('toast-area').appendChild(el);
  setTimeout(() => {
    el.style.cssText += 'opacity:0;transform:translateX(20px);transition:all .3s';
    setTimeout(() => el.remove(), 310);
  }, ms);
}

/* ════════════════════════════════════════════════
   POLLING
════════════════════════════════════════════════ */
async function poll(showProgress = false) {
  if (S.busy) return;
  S.busy = true;
  setPollState('active');
  if (showProgress) setProgress(15);

  try {
    const res = await fetch(API_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    if (showProgress) setProgress(85);
    ingest(raw);
    if (showProgress) setProgress(100);
    setPollState('idle');
    S.hadError = false;
    document.getElementById('last-updated').textContent = fmtNow();
  } catch (e) {
    if (showProgress) setProgress(0);
    setPollState('err');
    if (!S.hadError) { toast('Αδυναμία πρόσβασης στο API — νέα προσπάθεια κάθε 4 δευτερόλεπτα', 'warn', 4000); S.hadError = true; }
  }

  S.busy = false;
  S.pollTimer = setTimeout(poll, POLL_MS);
}

function manualRefresh() {
  clearTimeout(S.pollTimer);
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 560);
  poll(true);
}

function setPollState(s) {
  const dot = document.getElementById('poll-dot');
  const lbl = document.getElementById('poll-lbl');
  if (s === 'active') {
    dot.className = 'poll-dot'; lbl.textContent = 'Λήψη…';
  } else if (s === 'idle') {
    dot.className = 'poll-dot idle';
    lbl.textContent = 'Ζωντανά';
    setTimeout(() => { lbl.textContent = `Επόμενη λήψη σε ${POLL_MS/1000}δ`; }, 600);
  } else {
    dot.className = 'poll-dot err'; lbl.textContent = 'Σφάλμα';
  }
}

/* ════════════════════════════════════════════════
   INGEST
════════════════════════════════════════════════ */
function ingest(raw) {
  // Accept: array, { requests }, { logs }, { data }
  const items = Array.isArray(raw) ? raw : (raw.requests || raw.logs || raw.data || []);

  let anyChange    = false;
  let needDetail   = false;
  const changedIds = new Set();

  items.forEach(item => {
    // Normalize: item might be { payload, audit_trail, status } or a flat payload
    const payload    = item.payload || item;
    const id         = payload.request_id || payload.id || btoa(JSON.stringify(payload)).slice(0, 16);
    const status     = item.status || payload.status || 'pending';
    const audit      = item.audit_trail || payload.audit_trail || [];
    const scenarioId = item.scenario_id ?? null;
    const hash       = `${status}|${audit.length}`;

    if (!S.seenIds.has(id)) {
      S.seenIds.add(id);
      S.requestHashes[id] = hash;
      anyChange = true;
      changedIds.add(id);
      toast(`Νέο αίτημα: ${String(id).slice(-12)}`, 'info', 3000);
      S.requests.unshift({ id, status, payload, audit, scenarioId }); // newest first
      // Auto-focus new pending requests
      if (status === 'pending') {
        S.selectedId = id;
        needDetail = true;
      }
    } else if (S.requestHashes[id] !== hash) {
      S.requestHashes[id] = hash;
      anyChange = true;
      changedIds.add(id);
      const idx = S.requests.findIndex(r => r.id === id);
      if (idx >= 0) {
        S.requests[idx] = { id, status, payload, audit, scenarioId };
        if (id === S.selectedId) needDetail = true;
        // Clear SLA tracking if request is no longer pending
        if (status !== 'pending') delete S.slaStart[id];
      }
    }
  });

  if (!anyChange) return;

  // Stats
  const total   = S.requests.length;
  const pending = S.requests.filter(r => r.status === 'pending').length;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-pending').textContent = pending;

  const dot = document.getElementById('sidebar-dot');
  dot.className = `dot ${pending > 0 ? 'dot-yellow' : total > 0 ? 'dot-green' : 'dot-gray'}`;

  renderList(changedIds);

  // Only re-render detail if the selected card actually changed
  if (needDetail && S.selectedId) {
    const updated = S.requests.find(r => r.id === S.selectedId);
    if (updated) renderDetail(updated);
  }
}

/* ════════════════════════════════════════════════
   REQUEST LIST
════════════════════════════════════════════════ */
function renderList(changedIds = null) {
  const container = document.getElementById('req-list');
  if (S.requests.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🛡</div><div class="empty-title">Δεν υπάρχουν αιτήματα ακόμη</div><div class="empty-sub">Αναμονή για συμβάντα HITL…</div></div>`;
    return;
  }
  const existing = new Set([...container.querySelectorAll('.req-card')].map(el => el.dataset.id));

  S.requests.forEach((r, i) => {
    const isNew     = !existing.has(r.id);
    const isChanged = changedIds === null || changedIds.has(r.id);

    // Skip cards that exist and haven't changed (avoids re-render flicker)
    if (!isNew && !isChanged) return;

    const p = r.payload;
    const action    = p.action || {};
    const hitl      = p.hitl || {};
    const ctx       = p.context || {};
    const riskPct   = Math.round((ctx.risk_score || 0) * 100);
    const riskColor = riskPct > 80 ? 'var(--red)' : riskPct > 60 ? 'var(--yellow)' : 'var(--green)';
    const urgColor  = hitl.urgency === 'critical' ? 'var(--red)' : hitl.urgency === 'high' ? 'var(--yellow)' : 'var(--accent)';
    const resource  = action.resource || action.dataset || action.target || action.cluster || '—';
    const actionLbl = fmtActionType(action.type);
    const agentName = (p.agent || {}).name || '—';

    const inner = `
      <div class="rc-top">
        <span class="rc-id">${String(r.id).slice(-14)}</span>
        <span class="status-badge sb-${r.status}">${fmtStatus(r.status)}</span>
      </div>
      <div class="rc-action">${actionLbl}</div>
      <div class="rc-meta">
        <span style="color:${urgColor}">▲ ${fmtUrgency(hitl.urgency)}</span>
        <span style="color:var(--text-dim)">·</span>
        <span>${agentName}</span>
        <span style="color:var(--text-dim)">·</span>
        <span style="color:var(--text-dim)">${String(resource).slice(0, 26)}</span>
      </div>
      <div class="risk-bar-mini">
        <div class="risk-fill-mini" style="width:${riskPct}%;background:${riskColor}"></div>
      </div>`;

    if (isNew) {
      const card = document.createElement('div');
      card.className = `req-card s-${r.status}${r.id === S.selectedId ? ' selected' : ''}`;
      card.dataset.id = r.id;
      card.style.animationDelay = `${i * 0.055}s`;
      card.innerHTML = inner;
      card.onclick = () => selectRequest(r);
      container.insertBefore(card, container.children[i] || null);
    } else {
      const card = container.querySelector(`[data-id="${r.id}"]`);
      if (card) {
        card.className = `req-card s-${r.status}${r.id === S.selectedId ? ' selected' : ''}`;
        card.innerHTML = inner;
        card.onclick = () => selectRequest(r);
      }
    }
  });
}

/* ════════════════════════════════════════════════
   SELECT + DETAIL
════════════════════════════════════════════════ */
function selectRequest(r) {
  S.selectedId = r.id;
  document.querySelectorAll('.req-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.id === r.id)
  );
  document.getElementById('detail-req-id').textContent = String(r.id).slice(-20);
  renderDetail(r);
}

function renderDetail(r) {
  const p      = r.payload;
  const action = p.action  || {};
  const hitl   = p.hitl    || {};
  const ctx    = p.context || {};
  const req    = p.requester || {};
  const agent  = p.agent   || {};
  const meta   = p.metadata || {};
  const riskPct   = Math.round((ctx.risk_score || 0) * 100);
  const riskColor = riskPct > 80 ? 'var(--red)' : riskPct > 60 ? 'var(--yellow)' : 'var(--green)';
  const resource  = action.resource || action.dataset || action.target || action.cluster || '—';
  const statusClr = r.status === 'approved' ? 'var(--green)' : r.status === 'denied' ? 'var(--red)' : r.status === 'escalated' ? '#ff7b72' : 'var(--yellow)';
  const urgClr    = hitl.urgency === 'critical' ? 'var(--red)' : hitl.urgency === 'high' ? 'var(--yellow)' : 'var(--accent)';
  const channels  = (hitl.channels || []).map(c => `<span class="ch-pill">${fmtChannel(c)}</span>`).join(' ');
  const flags     = ctx.risk_flags || [];
  const slaMin    = hitl.sla_minutes || 0;
  const slaLbl    = slaMin >= 60 ? `${slaMin/60}ω SLA` : `${slaMin}λ SLA`;

  const wrap = document.getElementById('detail-wrap');
  wrap.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'detail-body detail-content';

  // ── LEFT COLUMN ──
  const left = document.createElement('div');
  left.className = 'detail-left';
  left.innerHTML = `
    <div class="data-section">
      <div class="section-label">Κατάσταση</div>
      <div class="data-row">
        <span class="d-label">Απόφαση</span>
        <span class="d-val" style="color:${statusClr}">${fmtStatus(r.status)}</span>
      </div>
      <div class="data-row">
        <span class="d-label">Επείγον</span>
        <span class="d-val" style="color:${urgClr}">${fmtUrgency(hitl.urgency)}</span>
      </div>
      ${r.status === 'pending' && slaMin ? `
      <div class="data-row">
        <span class="d-label">SLA</span>
        <span class="sla-timer sla-ok" id="sla-${r.id}">${slaLbl}</span>
      </div>` : ''}
    </div>

    <div class="data-section">
      <div class="section-label">Ενέργεια</div>
      <div class="data-row">
        <span class="d-label">Τύπος</span>
        <span class="d-val warn">${fmtActionType(action.type)}</span>
      </div>
      <div class="data-row">
        <span class="d-label">Πόρος</span>
        <span class="d-val mono">${resource}</span>
      </div>
      ${action.permission_level ? `<div class="data-row"><span class="d-label">Δικαίωμα</span><span class="d-val">${fmtPermission(action.permission_level)}</span></div>` : ''}
      ${action.duration_hours ? `<div class="data-row"><span class="d-label">Διάρκεια</span><span class="d-val">${action.duration_hours}ω</span></div>` : ''}
      ${action.estimated_cost_eur ? `<div class="data-row"><span class="d-label">Εκτ. Κόστος</span><span class="d-val danger">€${Number(action.estimated_cost_eur).toLocaleString()}</span></div>` : ''}
      ${action.seats ? `<div class="data-row"><span class="d-label">Θέσεις</span><span class="d-val">${action.seats}</span></div>` : ''}
      ${action.record_count ? `<div class="data-row"><span class="d-label">Εγγραφές</span><span class="d-val danger">${Number(action.record_count).toLocaleString()}</span></div>` : ''}
      ${action.justification ? `<div class="data-row" style="flex-direction:column;gap:5px"><span class="d-label">Αιτιολόγηση</span><span style="font-size:12px;color:var(--text-secondary);line-height:1.5">${action.justification}</span></div>` : ''}
    </div>

    <div class="data-section">
      <div class="section-label">Κίνδυνος</div>
      <div class="data-row" style="align-items:center">
        <span class="d-label">Βαθμός</span>
        <div class="risk-wrap">
          <div class="risk-bar"><div class="risk-fill" style="width:${riskPct}%;background:${riskColor}"></div></div>
          <span class="d-val" style="color:${riskColor};min-width:34px">${riskPct}%</span>
        </div>
      </div>
      ${ctx.agent_confidence ? `<div class="data-row"><span class="d-label">Βεβαιότητα</span><span class="d-val ok">${Math.round(ctx.agent_confidence*100)}%</span></div>` : ''}
      ${flags.length ? `<div class="tags">${flags.map(f=>`<span class="tag ${riskPct>80?'danger':'warn'}">${fmtRiskFlag(f)}</span>`).join('')}</div>` : ''}
    </div>

    <div class="data-section">
      <div class="section-label">Αιτών/ούσα &amp; Πράκτορας</div>
      ${req.display_name ? `<div class="data-row"><span class="d-label">Χρήστης</span><span class="d-val">${req.display_name}</span></div>` : ''}
      ${req.department ? `<div class="data-row"><span class="d-label">Τμήμα</span><span class="d-val">${req.department}</span></div>` : ''}
      ${req.role ? `<div class="data-row"><span class="d-label">Ρόλος</span><span class="d-val mono">${req.role}</span></div>` : ''}
      ${agent.id ? `<div class="data-row"><span class="d-label">Πράκτορας</span><span class="d-val mono">${agent.id}</span></div>` : ''}
    </div>

    <div class="data-section">
      <div class="section-label">Δρομολόγηση Gateway</div>
      ${hitl.required_approver_role ? `<div class="data-row"><span class="d-label">Εγκρίνων/ουσα</span><span class="d-val">${hitl.required_approver_role}</span></div>` : ''}
      ${hitl.escalation_role ? `<div class="data-row"><span class="d-label">Κλιμάκωση</span><span class="d-val">${hitl.escalation_role}</span></div>` : ''}
      ${hitl.channels ? `<div class="data-row"><span class="d-label">Κανάλια</span><div style="display:flex;gap:4px;flex-wrap:wrap">${channels}</div></div>` : ''}
      ${meta.environment ? `<div class="data-row"><span class="d-label">Περιβ.</span><span class="d-val" style="color:${meta.environment==='production'?'var(--red)':'var(--green)'}">${fmtEnvironment(meta.environment)}</span></div>` : ''}
      ${meta.trace_id ? `<div class="data-row" style="flex-direction:column;gap:5px"><span class="d-label">Αναγνωριστικό ιχν.</span><span class="d-val mono" style="font-size:10px;text-align:left">${meta.trace_id}</span></div>` : ''}
    </div>`;

  // ── RIGHT COLUMN: AUDIT ──
  const right = document.createElement('div');
  right.className = 'detail-right';

  if (!r.audit || r.audit.length === 0) {
    right.innerHTML = `<div class="audit-title">Ιστορικό ελέγχου</div><div style="color:var(--text-dim);font-size:12px;padding:12px 0">Δεν έχουν καταγραφεί συμβάντα.</div>`;
  } else {
    right.innerHTML = `
      <div class="audit-title">Ιστορικό ελέγχου</div>
      <div class="audit-list">
        ${r.audit.map(a => `
          <div class="audit-item ev-${a.type || 'request'}">
            <span class="audit-ts">${a.time || a.timestamp || '—'}</span>
            <span class="audit-text">${a.text || a.message || '—'}</span>
          </div>`).join('')}
      </div>`;
  }

  grid.appendChild(left);
  grid.appendChild(right);
  wrap.appendChild(grid);

  // Decision bar for pending requests
  if (r.status === 'pending') {
    const bar = document.createElement('div');
    bar.className = 'decision-bar';
    bar.id = `decision-bar-${r.id}`;
    bar.innerHTML = `
      <button class="btn-decide btn-approve" onclick="decide('${r.id}', 'approved')">✓ Έγκριση</button>
      <button class="btn-decide btn-deny"    onclick="decide('${r.id}', 'denied')">✕ Απόρριψη</button>`;
    wrap.appendChild(bar);
  }

  // Start SLA timer for pending requests
  if (r.status === 'pending' && slaMin > 0) startSLA(r.id, slaMin * 60);
}

/* ════════════════════════════════════════════════
   DECIDE
════════════════════════════════════════════════ */
async function decide(reqId, decision) {
  const r = S.requests.find(x => x.id === reqId);
  if (!r || r.scenarioId === null) return;

  // Disable buttons immediately to prevent double submission
  const bar = document.getElementById(`decision-bar-${reqId}`);
  if (bar) bar.querySelectorAll('button').forEach(b => b.disabled = true);

  try {
    const res = await fetch(`${API_BASE}/api/decide/${r.scenarioId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decision }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    toast(decision === 'approved' ? '✅ Εγκρίθηκε' : '❌ Απορρίφθηκε', decision === 'approved' ? 'ok' : 'warn', 3000);
    // Trigger a fresh poll so the UI updates immediately
    clearTimeout(S.pollTimer);
    poll();
  } catch (e) {
    toast('Αποτυχία αποστολής απόφασης — ελέγξτε το backend', 'error', 4000);
    if (bar) bar.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

/* ════════════════════════════════════════════════
   SLA TIMER
════════════════════════════════════════════════ */
function startSLA(id, totalSecs) {
  clearInterval(S.slaTimers[id]);
  // Preserve start time across re-renders so the countdown never resets
  if (!S.slaStart[id]) S.slaStart[id] = Date.now();

  function tick() {
    const elapsed = Math.floor((Date.now() - S.slaStart[id]) / 1000);
    const secs    = Math.max(0, totalSecs - elapsed);
    const el      = document.getElementById(`sla-${id}`);
    if (!el) { clearInterval(S.slaTimers[id]); return; }
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    el.textContent = h > 0
      ? `${h}ω ${String(m).padStart(2,'0')}λ`
      : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const pct = secs / totalSecs;
    el.className = `sla-timer ${pct > 0.5 ? 'sla-ok' : pct > 0.2 ? 'sla-warn' : 'sla-crit'}`;
    if (secs <= 0) { clearInterval(S.slaTimers[id]); el.textContent = 'ΚΛΙΜΑΚΩΣΗ…'; el.className = 'sla-timer sla-crit'; }
  }

  tick(); // paint immediately so there's no blank frame on re-render
  S.slaTimers[id] = setInterval(tick, 1000);
}

/* ════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  requestAnimationFrame(() => setTimeout(() => document.getElementById('app').classList.add('ready'), 60));
  setTimeout(poll, 350);
});

<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPOPTIS — Βοηθός Τεχνητής Νοημοσύνης</title>
    <style>
        @import url('https://rsms.me/inter/inter.css');

        html {
            font-family: 'Inter', sans-serif;
        }

        @supports (font-variation-settings: normal) {
            html {
                font-family: 'Inter var', sans-serif;
            }
        }

        :root {
            --bg-top: #000000;
            --bg-bottom: #1c2b53;
            --pill-bg: #282828;
            --tab-bg-active: #252628;
            --text-primary: #ffffff;
            --text-secondary: #909498;
            --accent: #5eacff;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at 50% 120%, var(--bg-bottom) 0%, var(--bg-top) 80%);
            color: var(--text-primary);
            opacity: 0;
            transform: translateY(14px) scale(0.985);
            filter: saturate(0.9);
            transition: opacity 0.65s ease, transform 0.9s cubic-bezier(0.2, 0.75, 0.2, 1), filter 0.8s ease;
        }

        .app-container.is-ready {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: saturate(1);
        }

        .app-container.intro-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: saturate(1);
        }

        /* ── HEADER ── */
        .header {
            width: 100%;
            height: 100px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            padding-top: 20px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tabs {
            background-color: #1A1B1F;
            border-radius: 100px;
            display: flex;
            gap: 2px;
            padding: 2px;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 100px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.1s;
            font-family: inherit;
        }

        .tab.active {
            background-color: var(--tab-bg-active);
            color: var(--text-primary);
        }

        /* ── CARDS SCROLLER ── */
        .cards-scroller {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 0 16px 20px;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        .cards-scroller::-webkit-scrollbar {
            display: none;
        }

        #header,
        #scroller,
        #footer {
            opacity: 0;
            transform: translateY(12px);
            filter: blur(6px);
            transition: opacity 0.65s ease, transform 0.8s cubic-bezier(0.2, 0.75, 0.2, 1), filter 0.8s ease;
        }

        .app-container.is-ready #header {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
            transition-delay: 0.12s;
        }

        .app-container.is-ready #scroller {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
            transition-delay: 0.26s;
        }

        .app-container.is-ready #footer {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
            transition-delay: 0.42s;
        }

        .card {
            display: inline-flex;
            flex-direction: column;
            align-items: start;
            min-width: 110px;
            background-color: #282828;
            border: 2px solid transparent;
            border-radius: 14px;
            margin-right: 12px;
            padding: 14px;
            cursor: pointer;
            transition: border 0.1s, background 0.15s, transform 0.15s;
            position: relative;
            opacity: 0;
            transform: translateY(16px) scale(0.98);
        }

        .app-container.is-ready .card {
            animation: cardReveal 0.52s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: calc(0.5s + var(--card-i, 0) * 0.12s);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card:active {
            transform: scale(0.95) !important;
        }

        .card.selected {
            border-color: #454545;
            background-color: #3a3a3a;
        }

        .card .icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .card .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }

        .card .bolt {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── CONTENT AREA ── */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Greeting */
        .greeting-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.2, 0.75, 0.2, 1);
        }

        .greeting-wrap.fade-out {
            opacity: 0;
            transform: translateY(-20px) scale(0.96);
            pointer-events: none;
        }

        .greeting {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.3;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            text-align: center;
            transform: translate3d(0, 0, 0) scale(1);
            transition: transform 1s cubic-bezier(0.2, 0.75, 0.2, 1), opacity 0.8s ease;
            will-change: transform;
        }

        .app-container.intro-active .greeting {
            transform: translate3d(var(--intro-dx, 0px), var(--intro-dy, 0px), 0) scale(1.05);
        }

        .greeting .word {
            color: #6d7278;
            opacity: 0.72;
            filter: blur(0.6px);
            display: inline-block;
            margin-right: 6px;
            animation: undimWord 0.55s ease forwards;
            animation-delay: calc(var(--i) * 0.14s + 0.2s);
        }

        .greeting .word:last-child {
            margin-right: 0;
        }

        @keyframes undimWord {
            from {
                color: #6d7278;
                opacity: 0.72;
                filter: blur(0.6px);
            }

            to {
                color: var(--text-primary);
                opacity: 1;
                filter: blur(0);
            }
        }

        /* Chat body */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px 20px 8px;
            display: none;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease 0.08s, transform 0.5s cubic-bezier(0.2, 0.75, 0.2, 1) 0.08s;
        }

        .chat-body.active {
            display: flex;
        }

        .chat-body.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .chat-body::-webkit-scrollbar {
            display: none;
        }

        /* Messages */
        .msg {
            display: flex;
            gap: 8px;
            max-width: 90%;
            animation: msgIn 0.32s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg.full {
            max-width: 100%;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .av-user {
            background: var(--accent);
            color: #000;
        }

        .av-agent {
            background: #1c1c1c;
            color: #aaa;
            border: 1px solid #2a2a2a;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            line-height: 1.55;
            font-size: 13.5px;
        }

        .b-user {
            background: var(--accent);
            color: #000;
            border-bottom-right-radius: 5px;
        }

        .b-agent {
            background: #1c1c1c;
            color: var(--text-primary);
            border: 1px solid #2a2a2a;
            border-bottom-left-radius: 5px;
        }

        .b-sys {
            background: rgba(94, 172, 255, .1);
            border: 1px solid rgba(94, 172, 255, .2);
            color: var(--accent);
            border-radius: 12px;
            font-size: 12.5px;
        }

        .b-warn {
            background: rgba(210, 153, 34, .1);
            border: 1px solid rgba(210, 153, 34, .25);
            color: #e3b341;
            border-radius: 12px;
            font-size: 12.5px;
        }

        .b-success {
            background: rgba(63, 185, 80, .1);
            border: 1px solid rgba(63, 185, 80, .25);
            color: #3fb950;
            border-radius: 12px;
            font-size: 12.5px;
        }

        .b-denied {
            background: rgba(218, 54, 51, .1);
            border: 1px solid rgba(218, 54, 51, .25);
            color: #ff7b72;
            border-radius: 12px;
            font-size: 12.5px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #444;
            border-radius: 50%;
            animation: tdBounce 0.9s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: .15s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes tdBounce {

            0%,
            60%,
            100% {
                transform: translateY(0)
            }

            30% {
                transform: translateY(-5px)
            }
        }

        /* ── FOOTER ── */
        .footer {
            height: 90px;
            width: 100%;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 10px 16px 20px;
        }

        .input-footer {
            flex: 1;
            padding: 16px 20px;
            background-color: rgba(40, 40, 40, 0.6);
            border-radius: 100px;
            border: none;
            backdrop-filter: blur(12px);
            color: #fff;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.2s;
        }

        .input-footer:focus {
            background-color: rgba(55, 55, 55, 0.7);
        }

        .input-footer::placeholder {
            color: var(--text-secondary);
        }

        .input-footer:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .input-send {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            flex-shrink: 0;
            background-color: rgba(40, 40, 40, 0.6);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            backdrop-filter: blur(12px);
            transition: background 0.15s, transform 0.1s, opacity 0.15s;
        }

        .input-send:active {
            transform: scale(0.91);
        }

        .input-send.is-disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        /* ── POLLING INDICATOR ── */
        .polling-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            padding: 4px 10px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .07);
            border-radius: 20px;
            margin-top: 6px;
        }

        .polling-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pollPulse 1.2s ease-in-out infinite;
        }

        @keyframes pollPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .4;
                transform: scale(0.7)
            }
        }

        /* ── TOASTS ── */
        .toast-area {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 200;
            pointer-events: none;
            width: 90%;
            max-width: 440px;
            opacity: 0;
        }

        .toast {
            background: rgba(20, 20, 26, 0.92);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 12.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
            backdrop-filter: blur(12px);
            animation: toastIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            transition: opacity 0.3s, transform 0.3s;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.96)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .toast-icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast-text {
            color: var(--text-primary);
            line-height: 1.4;
        }

        .t-info {
            border-left: 3px solid var(--accent);
        }

        .t-ok {
            border-left: 3px solid #3fb950;
        }

        .t-warn {
            border-left: 3px solid #e3b341;
        }

        .t-error {
            border-left: 3px solid #ff7b72;
        }

        /* ── TABS MORPH ── */
        .tabs {
            transition: background-color 0.35s ease, padding 0.35s ease;
        }

        .agent-name-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            padding: 10px 20px;
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        /* ── PAGE SYSTEM ── */
        .pages-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .page {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.32s ease, transform 0.38s cubic-bezier(0.2, 0.75, 0.2, 1);
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) !important;
        }

        .page.slide-from-right {
            transform: translateX(28px);
        }

        .page.slide-from-left {
            transform: translateX(-28px);
        }

        /* ── AGENTS PAGE ── */
        .agents-page-inner {
            flex: 1;
            overflow-y: auto;
            padding: 8px 20px 32px;
            scrollbar-width: none;
        }

        .agents-page-inner::-webkit-scrollbar {
            display: none;
        }

        .agents-section-title {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.09em;
            text-transform: uppercase;
            margin-bottom: 6px;
            padding: 12px 0 8px;
        }

        .agent-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.055);
            cursor: pointer;
            transition: opacity 0.15s;
            opacity: 0;
            animation: agentRowIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .agent-row:last-child {
            border-bottom: none;
        }

        .agent-row:active {
            opacity: 0.55;
        }

        @keyframes agentRowIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .agent-icon-wrap {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: #141416;
            border: 1px solid #242428;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .agent-info {
            flex: 1;
            min-width: 0;
        }

        .agent-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .agent-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .agent-urgency-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .urgency-high {
            background: #e3b341;
        }

        .urgency-medium {
            background: var(--accent);
        }

        .urgency-critical {
            background: #ff7b72;
        }

        .urgency-low {
            background: #3fb950;
        }

        .agent-chevron {
            color: #3a3a3e;
            flex-shrink: 0;
        }

        .agents-loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 13.5px;
        }

        .agents-loading-dots {
            display: flex;
            gap: 5px;
        }

        .agents-loading-dots span {
            width: 5px;
            height: 5px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: tdBounce 0.9s infinite;
        }

        .agents-loading-dots span:nth-child(2) {
            animation-delay: .15s;
        }

        .agents-loading-dots span:nth-child(3) {
            animation-delay: .3s;
        }

        .agents-error {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13.5px;
        }

        .agents-error-icon {
            font-size: 32px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="app-container" id="app">

        <header class="header" id="header">
            <button class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="25px" height="25px" viewBox="0 0 24 24" fill="none">
                    <path d="M4 6H20M4 12H14M4 18H9" stroke="#fff" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <div class="tabs">
                <button class="tab active" id="tab-auto" onclick="switchPage('auto')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15px" height="15px" viewBox="0 0 48 48"
                        fill="currentColor">
                        <g id="Layer_2">
                            <g id="invisible_box">
                                <rect width="48" height="48" fill="none" />
                            </g>
                            <g id="icons_Q2">
                                <path
                                    d="M44,5.1V14a2,2,0,0,1-2,2H33a2,2,0,0,1-2-2.3A2.1,2.1,0,0,1,33.1,12h4.3A18,18,0,0,0,6.1,22.2a2,2,0,0,1-2,1.8h0a2,2,0,0,1-2-2.2A22,22,0,0,1,40,8.9V5a2,2,0,0,1,2.3-2A2.1,2.1,0,0,1,44,5.1Z" />
                                <path
                                    d="M4,42.9V34a2,2,0,0,1,2-2h9a2,2,0,0,1,2,2.3A2.1,2.1,0,0,1,14.9,36H10.6A18,18,0,0,0,41.9,25.8a2,2,0,0,1,2-1.8h0a2,2,0,0,1,2,2.2A22,22,0,0,1,8,39.1V43a2,2,0,0,1-2.3,2A2.1,2.1,0,0,1,4,42.9Z" />
                            </g>
                        </g>
                    </svg>
                    Αυτόματο
                </button>
                <button class="tab" id="tab-agents" onclick="switchPage('agents')">
                    <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" height="20px"
                        width="20px" version="1.1" id="_x32_" viewBox="0 0 512 512" xml:space="preserve">
                        <style type="text/css">
                            .st0 {
                                fill: currentColor;
                            }
                        </style>

                                d="M10.3009 13.6949L20.102 3.89742M10.5795 14.1355L12.8019 18.5804C13.339 19.6545 13.6075 20.1916 13.9458 20.3356C14.2394 20.4606 14.575 20.4379 14.8492 20.2747C15.1651 20.0866 15.3591 19.5183 15.7472 18.3818L19.9463 6.08434C20.2845 5.09409 20.4535 4.59896 20.3378 4.27142C20.2371 3.98648 20.013 3.76234 19.7281 3.66167C19.4005 3.54595 18.9054 3.71502 17.9151 4.05315L5.61763 8.2523C4.48114 8.64037 3.91289 8.83441 3.72478 9.15032C3.56153 9.42447 3.53891 9.76007 3.66389 10.0536C3.80791 10.3919 4.34498 10.6605 5.41912 11.1975L9.86397 13.42C10.041 13.5085 10.1295 13.5527 10.2061 13.6118C10.2742 13.6643 10.3352 13.7253 10.3876 13.7933C10.4468 13.87 10.491 13.9585 10.5795 14.1355Z"

    </div><!-- /app-container -->

    <div class="toast-area" id="toast-area" style="opacity: 0;"></div>

    <script>
        /* ═══ TRIGGER MAP ═════════════════════════════════════════ */
        const TRIGGER_KEYWORDS = [
            ['πρόσβαση db', 'db', 'database', 'access'],
            ['άδεια', 'license'],
            ['ανάπτυξη', 'deploy', 'παραγωγή', 'prod'],
            ['pii', 'προσωπικά δεδομένα', 'gdpr']
        ];
        const AGENT_NAMES = ['Πράκτορας Ασφάλειας', 'Πράκτορας Οικονομικών', 'Πράκτορας Developer', 'Πράκτορας Συμμόρφωσης'];
        const QUICK_MSGS = [
            'Μπορείς να μου δώσεις πρόσβαση ανάγνωσης στη βάση prod-financial-reports-db; Τη χρειάζομαι για τη μηνιαία ανάλυση P&L.',
            'Παρακαλώ παρείχε άδεια Adobe Creative Cloud για όλη την ομάδα marketing (15 θέσεις).',
            'Κάνε ανάπτυξη της τελευταίας έκδοσης του Evox στην παραγωγή.',
            'Εξήγαγε το πλήρες σύνολο δεδομένων PII πελατών σε εξωτερικό S3 bucket για τον συνεργάτη αναλύσεων.',
        ];

        const BACKEND = 'http://localhost:4050';

        /* ═══ STATE ════════════════════════════════════════════════ */
        let state = { pollingInterval: null, decided: false };
        let chatMode = false;
        let originalTabsHTML = null;
        let currentPage = 'auto';
        let agentsLoaded = false;

        /* ═══ UTILS ═══════════════════════════════════════════════ */
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        function mdToHtml(t) {
            return t
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code style="font-family:monospace;background:rgba(255,255,255,.1);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>');
        }

        /* ═══ TOAST ════════════════════════════════════════════════ */
        function toast(msg, type = 'info', duration = 3200) {
            const icons = { info: 'ℹ️', ok: '✅', warn: '⚠️', error: '🚨' };
            const area = document.getElementById('toast-area');
            // area.style.opacity = '1';
            const el = document.createElement('div');
            el.className = `toast t-${type}`;
            el.innerHTML = `<span class="toast-icon">${icons[type] || 'ℹ️'}</span><span class="toast-text">${msg}</span>`;
            area.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(-6px) scale(0.96)';
                setTimeout(() => el.remove(), 300);
            }, duration);
        }

        /* ═══ PAGE SWITCHING ══════════════════════════════════════ */
        function switchPage(target) {
            if (target === currentPage) return;

            const fromPage = document.getElementById(`page-${currentPage}`);
            const toPage = document.getElementById(`page-${target}`);
            const tabFrom = document.getElementById(`tab-${currentPage}`);
            const tabTo = document.getElementById(`tab-${target}`);

            const goingRight = target === 'agents';

            // Set starting position for incoming page
            toPage.classList.remove('slide-from-left', 'slide-from-right', 'active');
            toPage.classList.add(goingRight ? 'slide-from-right' : 'slide-from-left');

            // Force reflow so the starting transform is applied before transition
            void toPage.offsetWidth;

            // Slide out the current page
            fromPage.classList.remove('active');
            fromPage.classList.add(goingRight ? 'slide-from-left' : 'slide-from-right');

            // Slide in the new page
            toPage.classList.add('active');

            // Update tab states
            tabFrom.classList.remove('active');
            tabTo.classList.add('active');

            currentPage = target;

            if (target === 'agents' && !agentsLoaded) {
                loadAgents();
            }
        }

        /* ═══ AGENT ICONS ═════════════════════════════════════════ */
        const AGENT_ICONS = {
            security: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" stroke="#5eacff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="#5eacff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`,
            finance: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="#3fb950" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`,
            devops: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2a7 7 0 1 0 0 14A7 7 0 0 0 12 2z" stroke="#e3b341" stroke-width="1.6"/>
        <path d="M12 6v6l4 2" stroke="#e3b341" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M6 19l-2 2M18 19l2 2M12 18v3" stroke="#e3b341" stroke-width="1.6" stroke-linecap="round"/>
    </svg>`,
            compliance: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="#ff7b72" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="14,2 14,8 20,8" stroke="#ff7b72" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="9" y1="13" x2="15" y2="13" stroke="#ff7b72" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="9" y1="17" x2="13" y2="17" stroke="#ff7b72" stroke-width="1.6" stroke-linecap="round"/>
    </svg>`,
        };

        const AGENT_DESCRIPTIONS = {
            security: 'Έλεγχος πρόσβασης · Εκτίμηση κινδύνου',
            finance: 'Εγκρίσεις προϋπολογισμού · Προμήθειες',
            devops: 'Αναπτύξεις · Υποδομή',
            compliance: 'GDPR · Διακυβέρνηση δεδομένων',
        };

        function localizeUrgency(urgency) {
            const map = {
                low: 'χαμηλή',
                medium: 'μεσαία',
                high: 'υψηλή',
                critical: 'κρίσιμη'
            };
            return map[urgency] || urgency;
        }

        function localizeRole(role) {
            const map = {
                'it-security-manager': 'Διαχειριστής Ασφάλειας Πληροφορικής',
                'finance-manager': 'Οικονομικός Διευθυντής',
                'devops-lead': 'Επικεφαλής Developer',
                'data-protection-officer': 'Υπεύθυνος Προστασίας Δεδομένων'
            };
            return map[role] || role;
        }

        function getAgentIcon(category) {
            return AGENT_ICONS[category] || `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="var(--text-secondary)" stroke-width="1.6"/>
        <path d="M12 8v4M12 16h.01" stroke="var(--text-secondary)" stroke-width="1.6" stroke-linecap="round"/>
    </svg>`;
        }

        /* ═══ LOAD AGENTS ═════════════════════════════════════════ */
        async function loadAgents() {
            const container = document.getElementById('agents-content');
            try {
                const res = await fetch(`${BACKEND}/api/agents`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const agents = await res.json();
                agentsLoaded = true;
                renderAgents(agents, container);
            } catch {
                container.className = 'agents-error';
                container.innerHTML = `
            <div class="agents-error-icon">⚠️</div>
            <div>Δεν είναι δυνατή η σύνδεση με το backend.<br>
            <span style="font-size:12px;color:var(--text-secondary)">Εκτέλεση: <code style="font-family:monospace;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:4px">cd backend && node index.js</code></span></div>`;
            }
        }

        function renderAgents(agents, container) {
            container.className = 'agents-page-inner';

            const title = document.createElement('p');
            title.className = 'agents-section-title';
            title.textContent = `${agents.length} ${agents.length === 1 ? 'διαθέσιμος' : 'διαθέσιμοι'} ${agents.length === 1 ? 'πράκτορας' : 'πράκτορες'}`;
            container.innerHTML = '';
            container.appendChild(title);

            agents.forEach((agent, i) => {
                const row = document.createElement('div');
                row.className = 'agent-row';
                row.style.animationDelay = `${i * 0.07}s`;

                const urgencyClass = `urgency-${agent.urgency || 'medium'}`;
                const desc = AGENT_DESCRIPTIONS[agent.category] || agent.trigger;

                row.innerHTML = `
            <div class="agent-icon-wrap">${getAgentIcon(agent.category)}</div>
            <div class="agent-info">
                <div class="agent-name">${agent.name}</div>
                <div class="agent-meta">
                    <span class="agent-urgency-dot ${urgencyClass}"></span>
                    ${desc}
                </div>
            </div>
            <div class="agent-chevron">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>`;

                container.appendChild(row);
            });
        }

        /* ═══ GREETING → CHAT TRANSITION ══════════════════════════ */
        function enterChatMode() {
            if (chatMode) return;
            chatMode = true;
            const gw = document.getElementById('greeting-wrap');
            const cb = document.getElementById('chat-body');
            gw.classList.add('fade-out');
            setTimeout(() => { gw.style.display = 'none'; }, 480);
            cb.classList.add('active');
            requestAnimationFrame(() => requestAnimationFrame(() => cb.classList.add('visible')));
        }

        /* ═══ CHAT RENDERING ══════════════════════════════════════ */
        function addMsg(role, text, bubbleCls) {
            enterChatMode();
            const body = document.getElementById('chat-body');
            const wrap = document.createElement('div');
            const isUser = role === 'user';
            const isSys = role === 'sys';

            if (isSys) {
                wrap.className = 'msg full';
                wrap.innerHTML = `<div class="bubble ${bubbleCls || 'b-sys'}" style="width:100%">${mdToHtml(text)}</div>`;
            } else {
                wrap.className = `msg${isUser ? ' user' : ''}`;
                const bc = bubbleCls || (isUser ? 'b-user' : 'b-agent');
                wrap.innerHTML = `
            <div class="avatar ${isUser ? 'av-user' : 'av-agent'}">${isUser ? 'SP' : 'AI'}</div>
            <div class="bubble ${bc}">${mdToHtml(text)}</div>`;
            }
            body.appendChild(wrap);
            body.scrollTop = body.scrollHeight;
            return wrap;
        }

        function addTyping() {
            const body = document.getElementById('chat-body');
            const el = document.createElement('div');
            el.className = 'msg'; el.id = 'typing-ind';
            el.innerHTML = `<div class="avatar av-agent">AI</div><div class="bubble b-agent"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            body.appendChild(el);
            body.scrollTop = body.scrollHeight;
        }
        function removeTyping() { document.getElementById('typing-ind')?.remove(); }

        // Persistent waiting row with animated dot
        let pollingMsgEl = null;
        function showPollingMsg(approverRole) {
            enterChatMode();
            const body = document.getElementById('chat-body');
            pollingMsgEl = document.createElement('div');
            pollingMsgEl.className = 'msg full';
            pollingMsgEl.innerHTML = `
        <div class="bubble b-sys" style="width:100%">
            ⏳ Το αίτημα δρομολογήθηκε προς <strong>${localizeRole(approverRole)}</strong> — αναμονή απόφασης
            <div class="polling-badge"><div class="polling-dot"></div> Εκτιμώμενος χρόνος αναμονής: ~${Math.floor(Math.random() * 4) + 1} λεπτά</div>
        </div>`;
            body.appendChild(pollingMsgEl);
            body.scrollTop = body.scrollHeight;
        }
        function removePollingMsg() { pollingMsgEl?.remove(); pollingMsgEl = null; }

        function setSendEnabled(v) {
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('send-btn');
            input.disabled = !v;
            v ? btn.classList.remove('is-disabled') : btn.classList.add('is-disabled');
        }

        /* ═══ SCROLLER + TABS ANIMATIONS ═════════════════════════ */
        function dismissScroller() {
            const scroller = document.getElementById('scroller');
            if (scroller.dataset.dismissed) return;
            scroller.dataset.dismissed = '1';
            const h = scroller.offsetHeight;
            scroller.style.height = h + 'px';
            scroller.style.overflow = 'hidden';
            void scroller.offsetHeight;
            scroller.style.transition = 'opacity 0.38s ease, transform 0.38s cubic-bezier(0.2,0.75,0.2,1), height 0.42s cubic-bezier(0.4,0,0.2,1), padding-bottom 0.42s ease';
            scroller.style.opacity = '0';
            scroller.style.transform = 'translateY(-10px)';
            scroller.style.height = '0';
            scroller.style.paddingBottom = '0';
        }

        function morphTabs(agentName) {
            const tabs = document.querySelector('.tabs');
            if (!originalTabsHTML) originalTabsHTML = tabs.innerHTML;
            tabs.style.transition = 'opacity 0.22s ease';
            tabs.style.opacity = '0';
            setTimeout(() => {
                tabs.innerHTML = `<span class="agent-name-label">${agentName}</span>`;
                tabs.style.backgroundColor = 'transparent';
                tabs.style.padding = '0';
                tabs.style.transition = 'opacity 0.35s ease';
                tabs.style.opacity = '1';
            }, 220);
        }

        function restoreScrollerAndTabs() {
            const scroller = document.getElementById('scroller');
            delete scroller.dataset.dismissed;
            scroller.style.cssText = '';

            if (originalTabsHTML) {
                const tabs = document.querySelector('.tabs');
                tabs.style.transition = 'opacity 0.22s ease';
                tabs.style.opacity = '0';
                setTimeout(() => {
                    tabs.innerHTML = originalTabsHTML;
                    tabs.style.cssText = '';
                    tabs.style.transition = 'opacity 0.35s ease';
                    tabs.style.opacity = '1';
                    setTimeout(() => { tabs.style.transition = ''; tabs.style.opacity = ''; }, 350);
                    // Re-wire tab click handlers after innerHTML restore
                    document.getElementById('tab-auto')?.addEventListener('click', () => switchPage('auto'));
                    document.getElementById('tab-agents')?.addEventListener('click', () => switchPage('agents'));
                }, 220);
            }
        }

        /* ═══ QUICK SEND ══════════════════════════════════════════ */
        function quickSend(idx) {
            if (document.getElementById('chat-input').disabled) return;
            document.getElementById('chat-input').value = QUICK_MSGS[idx];
            document.querySelectorAll('.card').forEach((c, i) =>
                i === idx ? c.classList.add('selected') : c.classList.remove('selected'));
            dismissScroller();
            morphTabs(AGENT_NAMES[idx]);
            sendMsg();
        }

        /* ═══ MAIN SEND FLOW ══════════════════════════════════════ */
        function onKey(e) { if (e.key === 'Enter') sendMsg(); }

        async function sendMsg(a) {
            if (a) {
                quickSend(2)
                const input = document.getElementById('chat-input');
                input.value = '';
                return;
            }
            const input = document.getElementById('chat-input');

            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            setSendEnabled(false);
            addMsg('user', text);

            const lower = text.toLowerCase();
            const scenarioIdx = TRIGGER_KEYWORDS.findIndex(keywordList => keywordList.some(k => lower.includes(k)));

            if (scenarioIdx === -1) {
                addTyping();
                await sleep(900);
                removeTyping();
                addMsg('agent', 'Βεβαίως! Θα το αναλάβω για εσένα. ✅ Η εργασία ολοκληρώθηκε — δεν απαιτείται έγκριση.');
                setSendEnabled(true);
                return;
            }

            // Restricted — fetch scenario from backend
            addTyping();
            let data;
            try {
                const res = await fetch(`${BACKEND}/api/start/${scenarioIdx}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                data = await res.json();
            } catch (err) {
                removeTyping();
                addMsg('sys',
                    `❌ Δεν είναι δυνατή η σύνδεση με το backend του HITL Gateway στο \`${BACKEND}\`. ` +
                    `Εκτέλεση: \`cd backend && npm install && node index.js\``,
                    'b-denied');
                setSendEnabled(true);
                return;
            }

            await sleep(500);
            removeTyping();
            addMsg('agent', `⚙️ ${data.ariaThink}`);

            addTyping();
            await sleep(1200);
            removeTyping();
            addMsg('sys', data.ariaBlock, 'b-warn');

            state.decided = false;

            await sleep(500);
            toast(`Το αίτημα HITL στάλθηκε · προτεραιότητα: ${localizeUrgency(data.urgency)}`, 'info');
            await sleep(500);
            toast(`Ρόλος εγκριτή: ${localizeRole(data.approverRole)}`, 'info');
            await sleep(400);

            showPollingMsg(data.approverRole);
            startPolling(scenarioIdx, data);
        }

        /* ═══ POLLING ═════════════════════════════════════════════ */
        function startPolling(id, data) {
            if (state.pollingInterval) clearInterval(state.pollingInterval);

            state.pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${BACKEND}/api/approvalStatus/${id}`);
                    const result = await res.json();

                    if (result.status !== 'pending') {
                        clearInterval(state.pollingInterval);
                        state.pollingInterval = null;
                        state.decided = true;
                        onDecision(result.status, data);
                    }
                } catch {
                    clearInterval(state.pollingInterval);
                    state.pollingInterval = null;
                    removePollingMsg();
                    addMsg('sys', '❌ Χάθηκε η σύνδεση με το HITL Gateway.', 'b-denied');
                    setSendEnabled(true);
                }
            }, 2000);
        }

        async function onDecision(decision, data) {
            removePollingMsg();
            decision === 'approved'
                ? toast('✅ Εγκρίθηκε — ο πράκτορας συνεχίζει', 'ok')
                : toast('❌ Απορρίφθηκε — ο πράκτορας ειδοποιήθηκε', 'warn');
            await sleep(600);
            addTyping();
            await sleep(1000);
            removeTyping();
            addMsg('sys',
                decision === 'approved' ? data.ariaResume.approved : data.ariaResume.denied,
                decision === 'approved' ? 'b-success' : 'b-denied');
            setSendEnabled(true);
        }

        /* ═══ RESET ═══════════════════════════════════════════════ */
        function resetDemo() {
            if (state.pollingInterval) clearInterval(state.pollingInterval);
            state = { pollingInterval: null, decided: false };
            chatMode = false;
            pollingMsgEl = null;

            const gw = document.getElementById('greeting-wrap');
            const cb = document.getElementById('chat-body');
            gw.style.display = '';
            gw.classList.remove('fade-out');
            cb.classList.remove('active', 'visible');
            cb.innerHTML = '';
            setSendEnabled(true);
            restoreScrollerAndTabs();

            // Return to auto page if on agents
            if (currentPage !== 'auto') {
                switchPage('auto');
            }
        }

        /* ═══ INIT ════════════════════════════════════════════════ */
        document.addEventListener('DOMContentLoaded', () => {
            const app = document.querySelector('.app-container');
            const greeting = document.querySelector('.greeting');

            document.querySelectorAll('.card').forEach((card, i) =>
                card.style.setProperty('--card-i', i));

            const centerGreetingThenRelease = () => {
                if (!app || !greeting) return;
                const rect = greeting.getBoundingClientRect();
                const dx = window.innerWidth / 2 - (rect.left + rect.width / 2);
                const dy = window.innerHeight / 2 - (rect.top + rect.height / 2);
                greeting.style.setProperty('--intro-dx', `${dx}px`);
                greeting.style.setProperty('--intro-dy', `${dy}px`);
                app.classList.add('intro-active');
                setTimeout(() => {
                    app.classList.add('is-ready');
                    app.classList.remove('intro-active');
                }, 180);
            };

            requestAnimationFrame(centerGreetingThenRelease);
            setTimeout(() => { app?.classList.add('is-ready'); app?.classList.remove('intro-active'); }, 900);
        });
    </script>

</body>
